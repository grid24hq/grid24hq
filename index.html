<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRID24HQ - Under Construction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .construction-image {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center 40%;
      display: block;
    }
  </style>
</head>
<body>

  <img
    src="img/underconstruction.png"
    alt="Under Construction"
    class="construction-image"
  />

</body>
</html>
